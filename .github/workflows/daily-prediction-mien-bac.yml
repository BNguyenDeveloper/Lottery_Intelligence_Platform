name: Daily Mien Bac Prediction

on:
  schedule:
    - cron: '40 9 * * *' # 16:40 Vietnam time, after Mien Nam import
    - cron: '40 10 * * *' # 17:40 Vietnam time, after Mien Trung import
    - cron: '40 11 * * *' # 18:40 Vietnam time, after Mien Bac import
  workflow_dispatch:

jobs:
  predict-mien-bac:
    runs-on: ubuntu-latest

    env:
      PORT: 3000
      NODE_ENV: production
      MONGODB_URI: ${{ secrets.MONGODB_URI }}
      LOTTERY_SOURCE_BASE_URL: https://xskt.com.vn
      XSKT_XSMB_DAILY_URL_TEMPLATE: https://xskt.net/xsmb/{dd}-{mm}-{yyyy}
      LOTTERY_FETCH_TIMEOUT_MS: 25000
      PREDICTION_TARGET: ${{ vars.PREDICTION_TARGET || 'last2' }}
      PREDICTION_HISTORY_DAYS: ${{ vars.PREDICTION_HISTORY_DAYS || '365' }}
      SMTP_HOST: ${{ vars.SMTP_HOST }}
      SMTP_PORT: ${{ vars.SMTP_PORT }}
      SMTP_USER: ${{ vars.SMTP_USER }}
      SMTP_PASS: ${{ secrets.SMTP_PASS }}
      EMAIL_FROM: ${{ vars.EMAIL_FROM }}
      EMAIL_TO: ${{ vars.EMAIL_TO }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Build
        run: npm run build

      - name: Check email configuration
        run: |
          [ -n "$SMTP_HOST" ] && echo "SMTP_HOST configured: yes" || echo "SMTP_HOST configured: no"
          [ -n "$SMTP_PORT" ] && echo "SMTP_PORT configured: yes" || echo "SMTP_PORT configured: no"
          [ -n "$SMTP_USER" ] && echo "SMTP_USER configured: yes" || echo "SMTP_USER configured: no"
          [ -n "$SMTP_PASS" ] && echo "SMTP_PASS configured: yes" || echo "SMTP_PASS configured: no"
          [ -n "$EMAIL_FROM" ] && echo "EMAIL_FROM configured: yes" || echo "EMAIL_FROM configured: no"
          [ -n "$EMAIL_TO" ] && echo "EMAIL_TO configured: yes" || echo "EMAIL_TO configured: no"

      - name: Run Mien Bac prediction
        run: npm run job:prediction:mien-bac -- --top 10 --trend-top 10 --blend-top 10
