name: Daily Lottery Job

on:
  schedule:
    - cron: '35 16 * * *' # Mien Nam
      timezone: 'Asia/Ho_Chi_Minh'
    - cron: '35 17 * * *' # Mien Trung
      timezone: 'Asia/Ho_Chi_Minh'
    - cron: '35 18 * * *' # Mien Bac
      timezone: 'Asia/Ho_Chi_Minh'
  workflow_dispatch:

jobs:
  daily-mien-bac:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '35 18 * * *'
    runs-on: ubuntu-latest

    env:
      PORT: 3000
      NODE_ENV: production
      MONGODB_URI: ${{ secrets.MONGODB_URI }}
      LOTTERY_SOURCE_BASE_URL: https://xskt.com.vn
      XSKT_XSMB_DAILY_URL_TEMPLATE: https://xskt.net/xsmb/{dd}-{mm}-{yyyy}
      LOTTERY_FETCH_TIMEOUT_MS: 25000

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Build
        run: npm run build

      - name: Run northern daily lottery job
        run: npm run job:mien-bac

      - name: Evaluate Mien Bac prediction after result import
        run: npm run job:post-result:mien-bac

  daily-mien-trung:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '35 17 * * *'
    runs-on: ubuntu-latest

    env:
      PORT: 3000
      NODE_ENV: production
      MONGODB_URI: ${{ secrets.MONGODB_URI }}
      LOTTERY_SOURCE_BASE_URL: https://xskt.com.vn
      XSKT_XSMB_DAILY_URL_TEMPLATE: https://xskt.net/xsmb/{dd}-{mm}-{yyyy}
      LOTTERY_FETCH_TIMEOUT_MS: 25000

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Build
        run: npm run build

      - name: Run central daily lottery job
        run: npm run job:mien-trung

  daily-mien-nam:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '35 16 * * *'
    runs-on: ubuntu-latest

    env:
      PORT: 3000
      NODE_ENV: production
      MONGODB_URI: ${{ secrets.MONGODB_URI }}
      LOTTERY_SOURCE_BASE_URL: https://xskt.com.vn
      XSKT_XSMB_DAILY_URL_TEMPLATE: https://xskt.net/xsmb/{dd}-{mm}-{yyyy}
      LOTTERY_FETCH_TIMEOUT_MS: 25000

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Build
        run: npm run build

      - name: Run southern daily lottery job
        run: npm run job:mien-nam
